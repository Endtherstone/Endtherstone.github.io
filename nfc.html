<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Space | ปัจฉิมนิเทศ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.15); /* ลดความทึบลงเพื่อให้เห็นพื้นหลังชัดขึ้น */
            --glass-border: rgba(255, 255, 255, 0.4);
            --text-main: #1d1d1f;
            --text-muted: #424245;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(-45deg, #fbc2eb, #a6c1ee, #ffecd2, #fcb69f);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
            /* เพิ่ม perspective ให้หน้าจอทั้งหมดเพื่อให้เอฟเฟกต์ 3D ชัดเจนที่สุด */
            perspective: 1200px; 
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* -------------------------------------------
           💎 จำลองความหนาของกระจกและการหักเห (Refraction)
           ------------------------------------------- */
        .glass-card {
            background: var(--glass-bg);
            /* เพิ่ม saturate(150%) brightness(110%) เพื่อบิดเบือนสีแสงที่ลอดผ่านให้ดูคล้ายการสะท้อนของของเหลว/เนื้อแก้ว */
            backdrop-filter: blur(30px) saturate(150%) brightness(110%);
            -webkit-backdrop-filter: blur(30px) saturate(150%) brightness(110%);
            border-radius: 40px;
            /* Fresnel Effect - ขอบกระจกจะมีความเงาตามความหนา (Inner Glow + Drop Shadow) */
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.15), 
                        inset 0 0 0 1px rgba(255, 255, 255, 0.4),
                        inset 0 10px 20px rgba(255, 255, 255, 0.3), /* แสงตกขอบบน */
                        inset 0 -10px 20px rgba(0, 0, 0, 0.05);     /* เงาสะท้อนลึกด้านล่าง */
            padding: 40px 30px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            position: relative;
            transform-style: preserve-3d; 
            transition: transform 0.1s ease-out;
            overflow: hidden; /* กักเก็บแสง Environment ไม่ให้ทะลุกรอบ */
            /* จัดเก็บตัวแปรที่รับมาจาก JS เพื่อทำ Gradient */
            --shimmer-x: 50%;
            --shimmer-y: 50%;
        }

        /* 🌟 แสงสะท้อนบนพื้นผิวที่วิ่งแบบสมจริง (Global Shimmer) 🌟 */
        .glass-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle 800px at var(--shimmer-x) var(--shimmer-y), 
                                        rgba(255, 255, 255, 0.4) 0%, 
                                        rgba(255, 255, 255, 0) 60%);
            pointer-events: none;
            z-index: 0;
            mix-blend-mode: overlay; /* ผสมแสงให้เข้ากับพื้นหลัง */
            opacity: 0.8;
            transition: opacity 0.3s;
        }

        /* เอาไว้ให้ส่วนของ Content ทะลุขึ้นมาอยู่เหนือแสง */
        .card-content {
            position: relative;
            z-index: 10;
            transform-style: preserve-3d;
        }

        .share-btn {
            position: absolute;
            top: 25px;
            right: 25px;
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.3);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05), inset 0 2px 5px rgba(255,255,255,0.8);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            transform: translateZ(40px); /* ลอยออกจากตัวการ์ด */
        }
        
        .share-btn:hover {
            background: rgba(255, 255, 255, 0.9);
            transform: translateZ(50px) scale(1.1); /* เด้งเข้าหาตาผู้มอง */
        }

        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 15px 35px rgba(0,0,0,0.15), inset 0 0 10px rgba(0,0,0,0.2);
            margin-bottom: 20px;
            transform: translateZ(60px); 
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-main);
            transform: translateZ(30px);
            letter-spacing: -0.5px;
            text-shadow: 0 2px 5px rgba(255,255,255,0.5);
        }

        p.bio {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-top: 8px;
            transform: translateZ(20px);
        }

        .link-group {
            margin-top: 30px;
            text-align: left;
            transform: translateZ(10px);
        }

        .group-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 12px;
            padding-left: 10px;
            font-weight: 700;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* -------------------------------------
           iPadOS Spotlight Button (ปรับให้กลมกลืน)
           ------------------------------------- */
        .glass-btn {
            text-decoration: none;
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 18px 20px;
            border-radius: 20px;
            font-size: 1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden; 
            transform: translateZ(30px); /* ให้ปุ่มลอยขึ้นจากกระจกชั้นแรก */
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }

        .glass-btn::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle 80px at var(--x, 50%) var(--y, 50%), rgba(255, 255, 255, 0.9), transparent 100%);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 0;
        }

        .glass-btn > * {
            position: relative;
            z-index: 1;
        }

        .btn-content {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .glass-btn i { font-size: 1.4rem; }
        .glass-btn .fa-chevron-right { font-size: 0.8rem; opacity: 0.5; transition: all 0.3s; }
        .fa-facebook { color: #1877F2; }
        .fa-tiktok { color: #000000; }
        .fa-bag-shopping { color: #FF2D55; }

        .glass-btn:hover {
            border-color: rgba(255, 255, 255, 0.9);
            transform: translateZ(40px) scale(1.02);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1), 
                        inset 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .glass-btn:hover::before { opacity: 1; }
        .glass-btn:hover .fa-chevron-right { opacity: 1; transform: translateX(5px); }

    </style>
</head>
<body>

    <div class="glass-card" data-tilt data-tilt-max="15" data-tilt-speed="600" data-tilt-perspective="1000">
        
        <div class="card-content">
            <button class="share-btn" id="shareBtn" title="แชร์นามบัตร">
                <i class="fa-solid fa-arrow-up-right-from-square"></i>
            </button>

            <img src="https://i.pravatar.cc/300" alt="Profile" class="profile-pic">
            <h1>[ชื่อของคุณ]</h1>
            <p class="bio">🎓 Congratulation to me! | สแกนแล้วก็แอดมาด้วยนะ</p>

            <div class="link-group">
                <h2 class="group-title">Contact & Social</h2>
                <div class="links-container">
                    
                    <a href="https://facebook.com/yourprofile" target="_blank" class="glass-btn">
                        <div class="btn-content">
                            <i class="fa-brands fa-facebook"></i>
                            <span>แอดเพื่อนเฟสบุ๊ค</span>
                        </div>
                        <i class="fa-solid fa-chevron-right"></i>
                    </a>

                    <a href="https://tiktok.com/@yourprofile" target="_blank" class="glass-btn">
                        <div class="btn-content">
                            <i class="fa-brands fa-tiktok"></i>
                            <span>ส่อง TikTok เราหน่อย</span>
                        </div>
                        <i class="fa-solid fa-chevron-right"></i>
                    </a>

                </div>
            </div>

            <div class="link-group">
                <h2 class="group-title">Support Me</h2>
                <div class="links-container">
                    
                    <a href="https://your-affiliate-link.com" target="_blank" class="glass-btn">
                        <div class="btn-content">
                            <i class="fa-solid fa-bag-shopping"></i>
                            <span>อุดหนุนของ (เค้าได้ค่าคอม!)</span>
                        </div>
                        <i class="fa-solid fa-chevron-right"></i>
                    </a>

                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>
    
    <script>
        // ระบบแชร์
        document.getElementById('shareBtn').addEventListener('click', async () => {
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'นามบัตรดิจิทัลของฉัน',
                        text: 'แก สแกนอันนี้แล้วแอดมา หรือช่วยกดซื้อของให้หน่อยนะ!',
                        url: window.location.href
                    });
                } catch (err) {
                    console.log('User cancelled share');
                }
            } else {
                navigator.clipboard.writeText(window.location.href);
                alert("ก๊อปปี้ลิงก์เรียบร้อยแล้ว! ส่งให้เพื่อนได้เลย");
            }
        });

        // ✨ 1. Spotlight บนปุ่มแบบ iPadOS
        document.querySelectorAll('.glass-btn').forEach(btn => {
            btn.addEventListener('mousemove', e => {
                const rect = btn.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                btn.style.setProperty('--x', `${x}px`);
                btn.style.setProperty('--y', `${y}px`);
            });
        });

        // ✨ 2. ระบบคำนวณทิศทางแสงสะท้อนของกระจก (Global Shimmer & Reflection)
        const card = document.querySelector('.glass-card');
        
        // ฟังการขยับเมาส์บนหน้าจอทั้งหมด เพื่อจำลองว่าแสงวิ่งมาจากทางไหน
        document.addEventListener('mousemove', (e) => {
            const mouseX = e.clientX;
            const mouseY = e.clientY;
            
            // หาขนาดและตำแหน่งของการ์ด
            const cardRect = card.getBoundingClientRect();
            
            // คำนวณเปอร์เซ็นต์ว่าเมาส์อยู่ตรงไหนของพื้นที่การ์ด
            // ลบด้วย offset ให้จุดกำเนิดแสงอยู่นอกขอบการ์ดได้ ทำให้การกวาดแสงดูกว้างและสมจริงขึ้น
            const percentX = ((mouseX - cardRect.left) / cardRect.width) * 100;
            const percentY = ((mouseY - cardRect.top) / cardRect.height) * 100;

            // ส่งพิกัดเปอรเซ็นต์ไปที่ตัวแปร CSS บน .glass-card เพื่อทำ Gradient วิ่งสะท้อน
            card.style.setProperty('--shimmer-x', `${percentX}%`);
            card.style.setProperty('--shimmer-y', `${percentY}%`);
        });

    </script>

</body>
</html>
