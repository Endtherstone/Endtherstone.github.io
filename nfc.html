<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peerapat Lairin m.6/1 | ปัจฉิมนิเทศ</title>
  <link rel="shortcut icon" href="assets/images/channels4-profile-1-96x96.jpg" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.25);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text-main: #1d1d1f;
            --text-muted: #424245;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        /* พื้นหลังขยับได้ (Animated Gradient) */
        body {
            background: linear-gradient(-45deg, #fbc2eb, #a6c1ee, #ffecd2, #fcb69f);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* การ์ดหลัก พร้อมรองรับ 3D Tilt */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1), 
                        inset 0 0 0 1px rgba(255, 255, 255, 0.5);
            padding: 40px 30px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            position: relative;
            transform-style: preserve-3d; /* สำหรับ 3D */
            transition: transform 0.1s;
        }

        /* ปุ่มแชร์มุมขวาบน */
        .share-btn {
            position: absolute;
            top: 25px;
            right: 25px;
            background: rgba(255, 255, 255, 0.5);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            transform: translateZ(20px); /* 3D effect */
        }
        .share-btn:hover {
            background: #fff;
            transform: translateZ(20px) scale(1.1);
        }

        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            margin-bottom: 20px;
            transform: translateZ(30px); /* 3D เด้งออกมา */
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-main);
            transform: translateZ(20px);
            letter-spacing: -0.5px;
        }

        p.bio {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-top: 8px;
            transform: translateZ(20px);
        }

        .link-group {
            margin-top: 30px;
            text-align: left;
            transform: translateZ(10px);
        }

        .group-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 12px;
            padding-left: 10px;
            font-weight: 700;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* ดีไซน์ปุ่มแบบ Advanced */
        .glass-btn {
            text-decoration: none;
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.6);
            padding: 18px 20px;
            border-radius: 20px;
            font-size: 1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
        }

        .btn-content {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .glass-btn i {
            font-size: 1.4rem;
        }

        /* ไอคอนลูกศรด้านขวา */
        .glass-btn .fa-chevron-right {
            font-size: 0.8rem;
            opacity: 0.5;
            transition: all 0.3s;
        }

        /* สีไอคอนเฉพาะ */
        .fa-facebook { color: #1877F2; }
        .fa-tiktok { color: #000000; }
        .fa-bag-shopping { color: #FF2D55; }

        /* Hover Effect มีแสงวาบ */
        .glass-btn:hover {
            background: rgba(255, 255, 255, 0.8);
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(255, 255, 255, 0.5), 
                        0 5px 15px rgba(0, 0, 0, 0.05);
        }

        .glass-btn:hover .fa-chevron-right {
            opacity: 1;
            transform: translateX(5px);
        }

    </style>
</head>
<body>

    <div class="glass-card" data-tilt data-tilt-max="10" data-tilt-speed="400" data-tilt-glare data-tilt-max-glare="0.2">
        
        <button class="share-btn" id="shareBtn" title="แชร์นามบัตร">
            <i class="fa-solid fa-arrow-up-right-from-square"></i>
        </button>

        <img src="icon.png" alt="Profile" class="profile-pic">
        <h1>Peerapat Lairin</h1>
        <p class="bio">🎓 Congratulation to me! | สแกนแล้วก็แอดมาด้วยนะ</p>

        <div class="link-group">
            <h2 class="group-title">Contact & Social</h2>
            <div class="links-container">
                
                <a href="https://www.facebook.com/peerapat.lairin?" target="_blank" class="glass-btn">
                    <div class="btn-content">
                        <i class="fa-brands fa-facebook"></i>
                        <span>แอดเพื่อนเฟสบุ๊ค</span>
                    </div>
                    <i class="fa-solid fa-chevron-right"></i>
                </a>

                <a href="https://tiktok.com/@endtherstone" target="_blank" class="glass-btn">
                    <div class="btn-content">
                        <i class="fa-brands fa-tiktok"></i>
                        <span>ส่อง TikTok เราหน่อย</span>
                    </div>
                    <i class="fa-solid fa-chevron-right"></i>
                </a>

            </div>
        </div>

        <div class="link-group">
            <h2 class="group-title">Support Me</h2>
            <div class="links-container">
                
                <a href="https://vt.tiktok.com/ZS9d9SoFDBau2-X3xhW/" target="_blank" class="glass-btn">
                    <div class="btn-content">
                        <i class="fa-solid fa-bag-shopping"></i>
                        <span>อุดหนุนของ (เค้าได้ค่าคอม!)</span>
                    </div>
                    <i class="fa-solid fa-chevron-right"></i>
                </a>

            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>
    
    <script>
        document.getElementById('shareBtn').addEventListener('click', async () => {
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'นามบัตรของคนเก๋สุดในก.ว.',
                        text: 'แก สแกนอันนี้แล้วแอดมา หรือช่วยกดซื้อของให้หน่อยนะ!',
                        url: window.location.href
                    });
                } catch (err) {
                    console.log('User cancelled share');
                }
            } else {
                // ถ้าเบราว์เซอร์ไม่รองรับ ให้กดก๊อปปี้ลิงก์แทน
                navigator.clipboard.writeText(window.location.href);
                alert("ก๊อปปี้ลิงก์เรียบร้อยแล้ว! ส่งให้เพื่อนได้เลย");
            }
        });
    </script>

</body>
</html>
