<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>หนังสือรุ่นของเรา - A4 Flipbook</title>
    <style>
        body {
            /* พื้นหลังสีเข้มแบบเว็บ Flipbook พรีเมียม */
            background-color: #2c2f33; 
            background-image: radial-gradient(circle, #40444b 0%, #23272a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: auto; /* เปลี่ยนจาก hidden เป็น auto เพื่อให้เลื่อนดูได้ตอนซูม */
        }

        /* กล่องคุมพื้นที่ให้อยู่ตรงกลางและมีปุ่มซ้ายขวา */
        .wrapper {
            display: flex;
            align-items: center;
            gap: 20px;
            width: 95%;
            max-width: 1200px;
            justify-content: center;
            padding: 50px 0; /* เพิ่มพื้นที่เผื่อการซูม */
        }

        /* กล่องบรรจุหนังสือ */
        .book-container {
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            border-radius: 4px;
            transition: transform 0.4s ease-in-out; /* ทำให้ซูมและจัดกลางสมูท */
            transform-origin: center center;
        }

        /* ตั้งค่าแต่ละหน้า */
        .my-page {
            background-color: #ffffff;
            overflow: hidden;
            border: solid 1px #e3e3e3;
        }

        /* จัดการรูปภาพให้พอดีกับหน้า A4 */
        .my-page img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
        }

        /* เงาสันหนังสือให้ดูมีมิติสมจริง */
        .my-page.--left {
            border-right: 0;
            box-shadow: inset -15px 0 30px -10px rgba(0,0,0,0.15);
        }
        .my-page.--right {
            border-left: 0;
            box-shadow: inset 15px 0 30px -10px rgba(0,0,0,0.15);
        }

        /* ปุ่มเปลี่ยนหน้าสไตล์ Heyzine */
        .nav-btn {
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
            z-index: 10;
        }

        .nav-btn:hover {
            background-color: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        /* ระบบปุ่มซูม */
        .zoom-controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 30px;
            display: flex;
            gap: 15px;
            z-index: 100;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            backdrop-filter: blur(5px);
        }

        .zoom-btn {
            background: none;
            border: none;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.2s;
        }

        .zoom-btn:hover {
            color: #4CAF50;
        }

        /* เมื่อเปิดในมือถือ ซ่อนปุ่มลูกศร (ใช้ปัดเอา) */
        @media (max-width: 768px) {
            .nav-btn {
                display: none;
            }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <button class="nav-btn" id="btn-prev">❮</button>

        <div class="book-container" id="book-container">
            <div id="book">
                <div class="my-page"><img src="1.png" alt="ปกหนังสือ"></div>
                <div class="my-page"><img src="2.png" alt="หน้า 2"></div>
                <div class="my-page"><img src="3.png" alt="หน้า 3"></div>
                <div class="my-page"><img src="4.png" alt="หน้า 4"></div>
                <div class="my-page"><img src="5.png" alt="หน้า 5"></div>
                <div class="my-page"><img src="6.png" alt="หน้า 6"></div>
                <div class="my-page"><img src="7.png" alt="หน้า 7"></div>
                <div class="my-page"><img src="8.png" alt="หน้า 8"></div>
                <div class="my-page"><img src="9.png" alt="หน้า 9"></div>
                <div class="my-page"><img src="10.png" alt="หน้า 10"></div>
                <div class="my-page"><img src="11.png" alt="หน้า 11"></div>
                <div class="my-page"><img src="12.png" alt="ปกหลัง"></div>
            </div>
        </div>

        <button class="nav-btn" id="btn-next">❯</button>
    </div>

    <div class="zoom-controls">
        <button class="zoom-btn" id="btn-zoom-out">➖</button>
        <button class="zoom-btn" id="btn-zoom-reset">100%</button>
        <button class="zoom-btn" id="btn-zoom-in">➕</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const bookElement = document.getElementById('book');
            const container = document.getElementById('book-container');
            
            // ตัวแปรสำหรับระบบซูม
            let currentZoom = 1;

            const pageFlip = new St.PageFlip(bookElement, {
                width: 380,             // ความกว้างฐาน (A4)
                height: 537,            // ความสูงฐาน (A4)
                size: "stretch",        // ยืดหยุ่นตามขนาดจอ
                minWidth: 300,          
                maxWidth: 420,          
                minHeight: 424,
                maxHeight: 594,
                showCover: true,        
                mobileScrollSupport: true, 
                maxShadowOpacity: 0.5,  

                /* แก้ไขส่วนนี้: เอา usePortrait: false ออก 
                   เพื่อให้จอมือถือสลับเป็นแนวตั้ง (แสดงหน้าเดียว) อัตโนมัติ */
                displayType: "double",  
            });

            // โหลดหน้าทั้งหมด
            pageFlip.loadFromHTML(document.querySelectorAll('.my-page'));

            // ฟังก์ชันอัปเดตทั้งการจัดกลาง (Translate) และการซูม (Scale)
            const updateTransform = () => {
                const index = pageFlip.getCurrentPageIndex();
                const total = pageFlip.getPageCount();
                
                // ตรวจสอบว่าแสดงผลแบบหน้าคู่ (Landscape) หรือหน้าเดี่ยว (Portrait)
                const isLandscape = pageFlip.getOrientation() === 'landscape';
                
                let translateX = 0;

                // จะขยับปกซ้าย-ขวาเฉพาะตอนที่อยู่ PC (หน้าคู่) เท่านั้น
                if (isLandscape) {
                    if (index === 0) {
                        translateX = -25; // ปกหน้า
                    } else if (index === total - 1) {
                        translateX = 25;  // ปกหลัง
                    }
                }

                // รันคำสั่งรวมกันทั้งขยับแกน X และซูม
                container.style.transform = `translateX(${translateX}%) scale(${currentZoom})`;
            };

            // ตรวจสอบทันทีที่โหลด
            updateTransform();

            // ตรวจสอบทุกครั้งที่มีการเปลี่ยนหน้า
            pageFlip.on('flip', () => updateTransform());
            pageFlip.on('update', () => updateTransform());
            
            // ตรวจสอบเมื่อมีการหมุนจอ (เปลี่ยนจากหน้าเดี่ยวเป็นคู่ หรือกลับกัน)
            pageFlip.on('changeOrientation', () => updateTransform());

            // สั่งการปุ่มกดเปลี่ยนหน้า
            document.getElementById('btn-prev').addEventListener('click', () => {
                pageFlip.flipPrev();
            });
            document.getElementById('btn-next').addEventListener('click', () => {
                pageFlip.flipNext();
            });

            // --- ระบบจัดการปุ่มซูม ---
            document.getElementById('btn-zoom-in').addEventListener('click', () => {
                if (currentZoom < 2.5) { // ซูมได้สูงสุด 2.5 เท่า
                    currentZoom += 0.25;
                    updateTransform();
                }
            });

            document.getElementById('btn-zoom-out').addEventListener('click', () => {
                if (currentZoom > 0.75) { // ซูมออกได้สุด 0.75 เท่า
                    currentZoom -= 0.25;
                    updateTransform();
                }
            });

            document.getElementById('btn-zoom-reset').addEventListener('click', () => {
                currentZoom = 1; // คืนค่าเริ่มต้น
                updateTransform();
            });
        });
    </script>
</body>
</html>
