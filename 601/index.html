<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#0b0f1a" />
    <title>PDF Viewer</title>
    <link rel="icon" href="./assets/icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./app.css" />
  </head>
  <body>
    <div class="bg" aria-hidden="true"></div>

    <header class="topbar">
      <div class="brand" role="banner" title="PDF Viewer">
        <span class="brandMark" aria-hidden="true"></span>
        <div class="brandText">
          <div class="brandTitle">PDF Viewer</div>
          <div class="brandSub" id="fileLabel">Loading…</div>
        </div>
      </div>

      <div class="toolbar" role="toolbar" aria-label="Tools">
        <button class="btn" id="prevBtn" type="button" title="Previous page">Prev</button>
        <div class="pageBox" title="Go to page">
          <input id="pageInput" inputmode="numeric" pattern="[0-9]*" type="text" aria-label="Page" />
          <span class="pageOf" aria-hidden="true">/</span>
          <span id="pageTotal" class="pageTotal" aria-label="Total pages">–</span>
        </div>
        <button class="btn" id="nextBtn" type="button" title="Next page">Next</button>

        <div class="sep" aria-hidden="true"></div>

        <button class="btn" id="zoomOutBtn" type="button" title="Zoom out">-</button>
        <input id="zoomRange" class="zoomRange" type="range" min="50" max="200" value="100" aria-label="Zoom" />
        <button class="btn" id="zoomInBtn" type="button" title="Zoom in">+</button>

        <div class="sep" aria-hidden="true"></div>
        <button class="btn" id="fullscreenBtn" type="button" title="Fullscreen">Fullscreen</button>
        <button class="btn" id="themeBtn" type="button" title="Dark/Light">Dark</button>
      </div>
    </header>

    <main class="stage" role="main">
      <div class="progressWrap" aria-label="Progress">
        <div class="progressTrack" aria-hidden="true">
          <div class="progressBar" id="progressBar" aria-hidden="true"></div>
        </div>
        <div class="progressText" id="progressText">–</div>
      </div>

      <section class="viewerShell" aria-label="Viewer">
        <div class="viewer" id="viewer">
          <div class="page3d" id="page3d" aria-live="polite">
            <div class="pageFace pageCurrent">
              <canvas id="canvasA" class="pageCanvas" width="10" height="10"></canvas>
            </div>
            <div class="pageFace pageNext">
              <canvas id="canvasB" class="pageCanvas" width="10" height="10"></canvas>
            </div>
            <div class="pageShade" aria-hidden="true"></div>
          </div>

          <div class="hud" id="hud">
            <div class="pill" id="statusPill">Preparing…</div>
          </div>
        </div>
      </section>
    </main>

    <script>
      (function () {
        function pill() { return document.getElementById("statusPill"); }
        function set(msg) { var el = pill(); if (el) el.textContent = msg; }
        window.__ebook_booted = false;
        setTimeout(function () {
          if (!window.__ebook_booted) {
            set("Starting… If this takes too long, open via https or a local server (not file://).");
          }
        }, 3500);
        window.addEventListener("error", function () {
          set("Startup error. Open DevTools Console for details.");
        });
        window.addEventListener("unhandledrejection", function () {
          set("Startup failed (Promise rejection). Open DevTools Console for details.");
        });
      })();
    </script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
