<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>หนังสือรุ่นของเรา - A4 Flipbook</title>
    <style>
        body {
            background-color: #2c2f33; 
            background-image: radial-gradient(circle, #40444b 0%, #23272a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: auto; 
            /* ป้องกันมือถือปัดแล้วดึงหน้าเว็บ (Pull-to-refresh) เผลอรีเฟรชเอง */
            overscroll-behavior-y: none;
        }

        .wrapper {
            display: flex;
            align-items: center;
            gap: 20px;
            width: 95%;
            max-width: 1200px;
            justify-content: center;
            padding: 60px 0; 
        }

        .book-container {
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            /* ปรับ transform ให้สมูทขึ้นมากเวลาจัดหน้าและซูม */
            transition: transform 0.35s cubic-bezier(0.25, 0.8, 0.25, 1); 
            transform-origin: center center;
            /* ป้องกันการคลุมดำรูปภาพเวลาทัชรัวๆ บนมือถือ */
            user-select: none; 
            -webkit-user-select: none;
        }

        .my-page {
            background-color: #ffffff;
            overflow: hidden;
            border: solid 1px #e3e3e3;
        }

        .my-page img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            pointer-events: none; /* ป้องกันมือถือกดค้างแล้วขึ้นเมนูเซฟรูป บังการเปลี่ยนหน้า */
        }

        .my-page.--left { border-right: 0; box-shadow: inset -15px 0 30px -10px rgba(0,0,0,0.15); }
        .my-page.--right { border-left: 0; box-shadow: inset 15px 0 30px -10px rgba(0,0,0,0.15); }

        .nav-btn {
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
            z-index: 10;
        }

        .nav-btn:hover {
            background-color: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        /* --- แผงควบคุมการซูม --- */
        .zoom-controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0, 0, 0, 0.75);
            padding: 8px 15px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 100;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            backdrop-filter: blur(5px);
        }

        .zoom-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .zoom-btn:hover {
            background-color: #4CAF50;
        }

        .zoom-btn:active {
            transform: scale(0.9);
        }

        /* กล่องสำหรับแสดงตัวเลข % */
        .zoom-text {
            color: white;
            font-weight: bold;
            font-size: 15px;
            min-width: 55px;
            text-align: center;
            font-family: monospace;
        }

        @media (max-width: 768px) {
            .nav-btn {
                display: none;
            }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <button class="nav-btn" id="btn-prev">❮</button>

        <div class="book-container" id="book-container">
            <div id="book">
                <div class="my-page"><img src="1.png" alt="ปกหนังสือ"></div>
                <div class="my-page"><img src="2.png" alt="หน้า 2"></div>
                <div class="my-page"><img src="3.png" alt="หน้า 3"></div>
                <div class="my-page"><img src="4.png" alt="หน้า 4"></div>
                <div class="my-page"><img src="5.png" alt="หน้า 5"></div>
                <div class="my-page"><img src="6.png" alt="หน้า 6"></div>
                <div class="my-page"><img src="7.png" alt="หน้า 7"></div>
                <div class="my-page"><img src="8.png" alt="หน้า 8"></div>
                <div class="my-page"><img src="9.png" alt="หน้า 9"></div>
                <div class="my-page"><img src="10.png" alt="หน้า 10"></div>
                <div class="my-page"><img src="11.png" alt="หน้า 11"></div>
                <div class="my-page"><img src="12.png" alt="ปกหลัง"></div>
            </div>
        </div>

        <button class="nav-btn" id="btn-next">❯</button>
    </div>

    <div class="zoom-controls">
        <button class="zoom-btn" id="btn-zoom-out">➖</button>
        <div class="zoom-text" id="zoom-display">100%</div>
        <button class="zoom-btn" id="btn-zoom-in">➕</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const bookElement = document.getElementById('book');
            const container = document.getElementById('book-container');
            const zoomDisplay = document.getElementById('zoom-display');
            
            let currentZoom = 1;

            const pageFlip = new St.PageFlip(bookElement, {
                width: 380,             
                height: 537,            
                size: "stretch",        
                minWidth: 300,          
                maxWidth: 450,          // ปรับกว้างขึ้น เพื่อให้ PC แสดงหน้าคู่ได้อย่างสมบูรณ์
                minHeight: 400,
                maxHeight: 650,
                showCover: true,        
                maxShadowOpacity: 0.5,  

                /* 🌟 การตั้งค่าสำคัญสำหรับแก้ปัญหามือถือ 🌟 */
                displayType: "double",  
                usePortrait: true,        // ยอมให้มือถือสลับเป็นแนวตั้ง (หน้าเดี่ยว) 
                mobileScrollSupport: false, // ปิดเพื่อไม่ให้การเลื่อนนิ้วขึ้นลงไปกวนการปัดหน้ากระดาษ
                swipeDistance: 15         // ลดระยะนิ้วสัมผัส ปัดนิดเดียวก็เปลี่ยนหน้า ไม่เด้งกลับ
            });

            // โหลดหน้าทั้งหมด
            pageFlip.loadFromHTML(document.querySelectorAll('.my-page'));

            // ฟังก์ชันอัปเดตการจัดกลาง และ การอัปเดตตัวเลขซูม
            const updateTransform = () => {
                const index = pageFlip.getCurrentPageIndex();
                const total = pageFlip.getPageCount();
                const isLandscape = pageFlip.getOrientation() === 'landscape'; // เช็คว่าเป็นหน้าคู่หรือไม่
                
                // 1. อัปเดตตัวเลขเปอร์เซ็นต์บนจอ
                zoomDisplay.innerText = Math.round(currentZoom * 100) + '%';
                
                let translateX = 0;

                // 2. ขยับปกซ้าย-ขวาเฉพาะตอนที่เป็นหน้าคู่ (PC) เท่านั้น
                if (isLandscape) {
                    if (index === 0) {
                        translateX = -25; // ปกหน้า ขยับมาตรงกลาง
                    } else if (index === total - 1) {
                        translateX = 25;  // ปกหลัง ขยับมาตรงกลาง
                    }
                }

                // 3. ใช้ Scale และ Translate รวมกัน
                container.style.transform = `scale(${currentZoom}) translateX(${translateX}%)`;
            };

            // ตรวจสอบทันทีที่โหลด
            updateTransform();

            // ตรวจสอบทุกครั้งที่มีการเปลี่ยนหน้า หรือหมุนจอ
            pageFlip.on('flip', () => updateTransform());
            pageFlip.on('update', () => updateTransform());
            pageFlip.on('changeOrientation', () => updateTransform());

            // สั่งการปุ่มลูกศร (สำหรับ PC)
            document.getElementById('btn-prev').addEventListener('click', () => { pageFlip.flipPrev(); });
            document.getElementById('btn-next').addEventListener('click', () => { pageFlip.flipNext(); });

            // --- ระบบจัดการปุ่มซูม ---
            document.getElementById('btn-zoom-in').addEventListener('click', () => {
                if (currentZoom < 3.0) { // ซูมได้ถึง 300%
                    currentZoom += 0.25;
                    updateTransform();
                }
            });

            document.getElementById('btn-zoom-out').addEventListener('click', () => {
                if (currentZoom > 0.5) { // หดได้สุด 50%
                    currentZoom -= 0.25;
                    updateTransform();
                }
            });

            // กดที่ตัวเลข % เพื่อรีเซ็ตกลับเป็น 100%
            zoomDisplay.addEventListener('click', () => {
                currentZoom = 1;
                updateTransform();
                zoomDisplay.style.cursor = 'pointer';
            });
            zoomDisplay.style.cursor = 'pointer'; // เปลี่ยน cursor ให้รู้ว่ากดได้
        });
    </script>
</body>
</html>
