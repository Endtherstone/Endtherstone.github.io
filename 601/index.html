<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>หนังสือรุ่นของเรา - A4 Flipbook</title>
    <style>
        body {
            background-color: #2c2f33; 
            background-image: radial-gradient(circle, #40444b 0%, #23272a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; 
            overscroll-behavior-y: none;
        }

        .wrapper {
            display: flex;
            align-items: center;
            gap: 20px;
            /* 🌟 ปรับให้ใช้พื้นที่หน้าจอคอมได้เต็มที่ขึ้น */
            width: 90vw; 
            height: 80vh; 
            max-width: 1400px;
            justify-content: center;
        }

        .book-container {
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            transition: transform 0.35s cubic-bezier(0.25, 0.8, 0.25, 1); 
            transform-origin: center center;
            user-select: none; 
            -webkit-user-select: none;
            /* 🌟 บังคับให้กล่องหนังสือขยายเต็มพื้นที่ที่ Wrapper กำหนดให้ */
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .my-page {
            background-color: #ffffff;
            overflow: hidden;
            border: solid 1px #e3e3e3;
        }

        .my-page img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            pointer-events: none; 
        }

        .my-page.--left { border-right: 0; box-shadow: inset -15px 0 30px -10px rgba(0,0,0,0.15); }
        .my-page.--right { border-left: 0; box-shadow: inset 15px 0 30px -10px rgba(0,0,0,0.15); }

        .nav-btn {
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
            z-index: 10;
        }

        .nav-btn:hover {
            background-color: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        .zoom-controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0, 0, 0, 0.75);
            padding: 8px 15px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 100;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            backdrop-filter: blur(5px);
        }

        .zoom-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .zoom-btn:hover {
            background-color: #4CAF50;
        }

        .zoom-btn:active {
            transform: scale(0.9);
        }

        .zoom-text {
            color: white;
            font-weight: bold;
            font-size: 15px;
            min-width: 55px;
            text-align: center;
            font-family: monospace;
        }

        @media (max-width: 768px) {
            .nav-btn {
                display: none;
            }
            .wrapper {
                width: 95vw;
                height: 75vh; 
            }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <button class="nav-btn" id="btn-prev">❮</button>

        <div class="book-container" id="book-container">
            <div id="book">
                <div class="my-page"><img src="1.png" alt="ปกหนังสือ"></div>
                <div class="my-page"><img src="2.png" alt="หน้า 2"></div>
                <div class="my-page"><img src="3.png" alt="หน้า 3"></div>
                <div class="my-page"><img src="4.png" alt="หน้า 4"></div>
                <div class="my-page"><img src="5.png" alt="หน้า 5"></div>
                <div class="my-page"><img src="6.png" alt="หน้า 6"></div>
                <div class="my-page"><img src="7.png" alt="หน้า 7"></div>
                <div class="my-page"><img src="8.png" alt="หน้า 8"></div>
                <div class="my-page"><img src="9.png" alt="หน้า 9"></div>
                <div class="my-page"><img src="10.png" alt="หน้า 10"></div>
                <div class="my-page"><img src="11.png" alt="หน้า 11"></div>
                <div class="my-page"><img src="12.png" alt="ปกหลัง"></div>
            </div>
        </div>

        <button class="nav-btn" id="btn-next">❯</button>
    </div>

    <div class="zoom-controls">
        <button class="zoom-btn" id="btn-zoom-out">➖</button>
        <div class="zoom-text" id="zoom-display">100%</div>
        <button class="zoom-btn" id="btn-zoom-in">➕</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const bookElement = document.getElementById('book');
            const container = document.getElementById('book-container');
            const zoomDisplay = document.getElementById('zoom-display');
            
            let currentZoom = 1;

            // 🌟 เช็คเลยว่าหน้าจอตอนนี้ความกว้างเกิน 768px (คอมพิวเตอร์/แท็บเล็ตแนวนอน) หรือไม่
            const isMobile = window.innerWidth <= 768;

            const pageFlip = new St.PageFlip(bookElement, {
                width: 400,             
                height: 565,            
                size: "stretch",        
                minWidth: 315,          
                maxWidth: 1000,          
                minHeight: 420,
                maxHeight: 1350,        
                showCover: true,        
                maxShadowOpacity: 0.5,  

                displayType: "double",  
                // 🌟 หัวใจสำคัญอยู่ตรงนี้: 
                // ถ้าเป็นมือถือ (isMobile = true) ยอมให้โชว์หน้าเดี่ยวได้
                // ถ้าเป็นคอม (isMobile = false) บังคับโชว์หน้าคู่เท่านั้น!
                usePortrait: isMobile,        
                
                mobileScrollSupport: false, 
                swipeDistance: 15         
            });

            pageFlip.loadFromHTML(document.querySelectorAll('.my-page'));

            const updateTransform = () => {
                const index = pageFlip.getCurrentPageIndex();
                const total = pageFlip.getPageCount();
                const isLandscape = pageFlip.getOrientation() === 'landscape'; 
                
                zoomDisplay.innerText = Math.round(currentZoom * 100) + '%';
                
                let translateX = 0;

                if (isLandscape) {
                    if (index === 0) {
                        translateX = -25; 
                    } else if (index === total - 1) {
                        translateX = 25;  
                    }
                }

                container.style.transform = `scale(${currentZoom}) translateX(${translateX}%)`;
            };

            updateTransform();

            pageFlip.on('flip', () => updateTransform());
            pageFlip.on('update', () => updateTransform());
            pageFlip.on('changeOrientation', () => updateTransform());

            document.getElementById('btn-prev').addEventListener('click', () => { pageFlip.flipPrev(); });
            document.getElementById('btn-next').addEventListener('click', () => { pageFlip.flipNext(); });

            document.getElementById('btn-zoom-in').addEventListener('click', () => {
                if (currentZoom < 3.0) {
                    currentZoom += 0.25;
                    updateTransform();
                }
            });

            document.getElementById('btn-zoom-out').addEventListener('click', () => {
                if (currentZoom > 0.5) {
                    currentZoom -= 0.25;
                    updateTransform();
                }
            });

            zoomDisplay.addEventListener('click', () => {
                currentZoom = 1;
                updateTransform();
            });
            zoomDisplay.style.cursor = 'pointer'; 
        });
    </script>
</body>
</html>
